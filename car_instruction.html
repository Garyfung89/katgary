<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to Get to Our Place 🏠</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --accent-mid: #52b788;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e8e3dc;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: var(--accent);
    color: white;
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .header-emoji {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px;
    opacity: 0.8;
    font-weight: 400;
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: rgba(0,0,0,0.15);
    height: 3px;
    margin-top: 16px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent-mid);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Step counter strip */
  .step-strip {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .step-counter {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.3px;
  }
  .dot-row {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s ease;
    cursor: pointer;
    flex-shrink: 0;
  }
  .dot.active {
    background: var(--accent);
    width: 18px;
    border-radius: 3px;
  }
  .dot.visited {
    background: var(--accent-mid);
  }

  /* Main slideshow */
  .slideshow-wrap {
    padding: 16px 16px 0;
  }

  .slide {
    display: none;
    animation: fadeIn 0.35s ease;
  }
  .slide.active {
    display: block;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slide-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .slide-image-wrap {
    position: relative;
    width: 100%;
    background: #e0ddd8;
    aspect-ratio: 4/3;
    overflow: hidden;
  }
  .slide-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .slide-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .slide-body {
    padding: 18px 18px 20px;
  }
  .slide-caption {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
  }
  .slide-caption:empty::before {
    content: 'Tap the arrow to continue →';
    color: var(--text-muted);
    font-style: italic;
    font-weight: 400;
  }

  /* Navigation buttons */
  .nav-row {
    display: flex;
    gap: 10px;
    padding: 14px 16px 0;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .nav-btn:active { transform: scale(0.97); }
  .btn-prev {
    background: var(--surface);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-prev:hover { border-color: var(--accent); color: var(--accent); }
  .btn-next {
    background: var(--accent);
    color: white;
    flex: 2;
  }
  .btn-next:hover { background: #235e42; }
  .btn-next.done {
    background: #e07a28;
  }
  .btn-prev:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* Completion card */
  .done-card {
    display: none;
    margin: 16px;
    background: var(--accent-light);
    border: 2px solid var(--accent-mid);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
  }
  .done-card.show { display: block; animation: fadeIn 0.4s ease; }
  .done-card .done-emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .done-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .done-card p { font-size: 14px; color: var(--text-muted); }

  /* Swipe hint */
  .swipe-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 12px 0 0;
    opacity: 0.7;
  }

  /* Restart button */
  .restart-btn {
    display: block;
    margin: 12px auto 0;
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 10px;
    cursor: pointer;
  }
  .restart-btn:hover { background: var(--accent); color: white; }
</style>
</head>
<body>

<div class="header">
  <span class="header-emoji">🏠</span>
  <h1>Getting to Our Place</h1>
  <p>Follow these steps to reach our visitor apartment</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width: 7%"></div>
  </div>
</div>

<div class="step-strip">
  <span class="step-counter" id="stepCounter">Step 1 of 14</span>
  <div class="dot-row" id="dotRow"></div>
</div>

<div class="slideshow-wrap" id="slideshowWrap">
  <!-- Slides injected by JS -->
</div>

<div class="nav-row">
  <button class="nav-btn btn-prev" id="btnPrev" onclick="changeSlide(-1)" disabled>← Back</button>
  <button class="nav-btn btn-next" id="btnNext" onclick="changeSlide(1)">Next →</button>
</div>

<p class="swipe-hint" id="swipeHint">← Swipe left or right to navigate →</p>

<div class="done-card" id="doneCard">
  <span class="done-emoji">🎉</span>
  <h2>You've made it!</h2>
  <p>Follow the lift to your floor and we'll see you soon.</p>
  <button class="restart-btn" onclick="goToSlide(1)">Start over</button>
</div>

<script>
  const total = 14;
  const captions = {
    1:  "Exit the roundabout onto the footpath between 9 and 11 Railway Street.",
    2:  "Look out for grey signage stating Altura & Epica Carpark.",
    3:  "Take the left lane for all visitors and stop at the gate.",
    4:  "Enter the unit number followed by the green bell button — the intercom will connect you to our unit.",
    5:  "Exit the roundabout on the right, like the black car.",
    6:  "Drive down the slope.",
    7:  "Follow the arrow.",
    8:  "Follow the arrow.",
    9:  "Follow the arrow.",
    10: "Follow the arrow.",
    11: "Follow the arrow down a level.",
    12: "Note the glass door is on level B2.",
    13: "Enter the glass door and turn left.",
    14: "Use the intercom to connect to our unit. Enter the second glass door and take the first lift arriving. Press the unit level in the lift panel."
  };

  let current = 1;

  // Build slides
  const wrap = document.getElementById('slideshowWrap');
  for (let i = 1; i <= total; i++) {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 1 ? ' active' : '');
    div.id = 'slide-' + i;
    div.innerHTML = `
      <div class="slide-card">
        <div class="slide-image-wrap">
          <img src="images/${i}.jpg" alt="Step ${i}" loading="${i <= 2 ? 'eager' : 'lazy'}">
          <span class="slide-badge">Step ${i}</span>
        </div>
        <div class="slide-body">
          <p class="slide-caption">${captions[i] || ''}</p>
        </div>
      </div>`;
    wrap.appendChild(div);
  }

  // Build dots
  const dotRow = document.getElementById('dotRow');
  for (let i = 1; i <= total; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i === 1 ? ' active' : '');
    dot.id = 'dot-' + i;
    dot.onclick = () => goToSlide(i);
    dotRow.appendChild(dot);
  }

  function updateUI() {
    // Slides
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
    document.getElementById('slide-' + current).classList.add('active');

    // Dots
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.remove('active', 'visited');
      if (i + 1 === current) d.classList.add('active');
      else if (i + 1 < current) d.classList.add('visited');
    });

    // Counter
    document.getElementById('stepCounter').textContent = `Step ${current} of ${total}`;

    // Progress bar
    document.getElementById('progressBar').style.width = (current / total * 100) + '%';

    // Buttons
    document.getElementById('btnPrev').disabled = current === 1;
    const btnNext = document.getElementById('btnNext');
    if (current === total) {
      btnNext.textContent = '✓ Done!';
      btnNext.classList.add('done');
    } else {
      btnNext.textContent = 'Next →';
      btnNext.classList.remove('done');
    }

    // Done card
    const doneCard = document.getElementById('doneCard');
    const swipeHint = document.getElementById('swipeHint');
    const navRow = document.querySelector('.nav-row');
    if (current === total) {
      doneCard.classList.add('show');
      swipeHint.style.display = 'none';
    } else {
      doneCard.classList.remove('show');
      swipeHint.style.display = 'block';
    }
  }

  function changeSlide(dir) {
    const next = current + dir;
    if (next < 1 || next > total) return;
    current = next;
    updateUI();
  }

  function goToSlide(n) {
    current = n;
    updateUI();
  }

  // Swipe support
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dt = Date.now() - touchStartTime;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40 && dt < 400) {
      changeSlide(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  updateUI();
</script>
</body>
</html>
