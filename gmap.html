
<!DOCTYPE html>
<html>
<head>
 <meta charset="utf-8" />
 <title>Mapbox Example</title>
 <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
 <script src="https://api.mapbox.com/mapbox-glapbox-gl.js
 https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css
 <style>
 body { margin: 0; padding: 0; }
 #map { position: absolute; top: 0; bottom: 0; width: 100%; }
 </style>
</head>
<body>
 <div id="map"></div>
 <script>
mapboxgl.accessToken  = 'pk.eyJ1IjoiZ2FyeWZ1bmcyMDIzIiwiYSI6ImNtY2xndmhjZjBiODYybHB4Y3B3eG1nbWQifQ.AtJCDaQ_Ib5fsdpshYU8aA';
 const map = new mapboxgl.Map({
 container: 'map',
 style: 'mapbox://styles/mapbox/streets-v11',
 center: [151.2049, -33.8925], // Redfern, NSW
 zoom: 14
 });

 new mapboxgl.Marker()
 .setLngLat([151.2049, -33.8925])
 .setPopup(new mapboxgl.Popup().setText("Redfern, NSW"))
 .addTo(map);
 </script>
</body>
</html>
